# ============================================================
# BetterWrite 宝塔 Nginx 反代配置
# 复制到 /www/server/panel/vhost/nginx/betterwrite.conf 后执行：
#   nginx -t && nginx -s reload
#
# 假设：
#   - BetterWrite web 容器监听 127.0.0.1:3000
#   - 子域名：www/app/api/admin.cosky.top
#   - SSL 证书申请位置：/www/server/panel/vhost/cert/{domain}/
# ============================================================

# 上游
upstream betterwrite_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name www.cosky.top app.cosky.top api.cosky.top admin.cosky.top;

    # Let's Encrypt 验证路径
    location /.well-known/acme-challenge/ {
        root /www/wwwroot/letsencrypt;
    }

    # 临时健康检查（SSL 申请前）
    location / {
        return 200 'BetterWrite is starting. Please wait for SSL setup.\n';
        add_header Content-Type text/plain;
    }
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name www.cosky.top app.cosky.top api.cosky.top admin.cosky.top;

    # TLS 证书（各子域名）
    ssl_certificate /www/server/panel/vhost/cert/www.cosky.top/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/www.cosky.top/privkey.pem;

    # 现代 TLS
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 通用安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 上传大小
    client_max_body_size 20M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # WebSocket / 长连接
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # 限流：API 路由 60 req/s
    location /api/ {
        limit_req zone=betterwrite_api burst=20 nodelay;
        proxy_pass http://betterwrite_web;
    }

    # 其余
    location / {
        proxy_pass http://betterwrite_web;
    }

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
}

# 限流配置（需在 nginx.conf http 块中预先定义）
# limit_req_zone $binary_remote_addr zone=betterwrite_api:10m rate=60r/s;
