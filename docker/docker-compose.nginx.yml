# 可选扩展：在 BetterWrite 主编排前增加 Nginx HTTPS 反向代理。
# 使用方式：
#   1. 准备 TLS 证书到 docker/nginx/certs/fullchain.pem 与 privkey.pem
#   2. docker compose --env-file .env.production \
#        -f docker/docker-compose.yml \
#        -f docker/docker-compose.nginx.yml up -d
#
# 注意：本文件会覆盖主 compose 中 web 服务的端口暴露方式，web 不再直接绑定宿主机端口。

services:
  web:
    ports: []
    networks:
      - frontend
      - backend

  nginx:
    image: nginx:alpine
    container_name: betterwrite-nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    networks:
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
