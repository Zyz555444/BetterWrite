upstream betterwrite_web {
  server betterwrite-web:3000;
}

server {
  listen 80;
  server_name _;

  # 强制跳转到 HTTPS；若仅内网测试可注释掉本 server 块。
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name _;

  # TLS 证书路径（需替换为真实证书）
  ssl_certificate /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;

  # 现代 TLS 配置
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;

  # 安全响应头（Next.js standalone 已输出部分，这里补充）
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "same-origin" always;

  # 请求体大小限制（支持 OCR / 作文提交等较大 JSON）
  client_max_body_size 20M;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  location / {
    proxy_pass http://betterwrite_web;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # WebSocket / 长连接支持（Next.js dev HMR 可选，生产通常不需要）
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }
}
